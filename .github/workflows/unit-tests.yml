name: Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest -q

      - name: Build package artifacts
        run: |
          pip install build
          python -m build

      - name: Smoke test wheel install and package usage
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "from synthkit import SynthKitConfig, augment_texts; from synthkit.providers.mock import MockProvider; out=augment_texts(['hello'], operation='paraphrase', provider=MockProvider(), config=SynthKitConfig(seed=1)); assert out and 'augmented_text' in out[0]"
